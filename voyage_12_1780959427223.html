<!DOCTYPE html><html lang='fr'><head><meta charset='UTF-8'><title>Mes voyages</title><meta name='viewport' content='width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0'><style>body { margin: 0; padding: 0; background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; } .app-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #111; } .story { display: none; width: 100%; max-width: 450px; height: 100vh; position: relative; flex-direction: column; background: #1e293b; box-shadow: 0 0 20px rgba(0,0,0,0.8); } @media (min-width: 500px) { .story { height: 90vh; max-height: 850px; border-radius: 16px; overflow: hidden; } } .story.active { display: flex; } .photo-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; } .photo { width: 100%; height: 100%; object-fit: cover; } .overlay { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 60%, transparent 100%); padding: 40px 20px 30px; box-sizing: border-box; z-index: 5; pointer-events: none; } .title { font-size: 2.2em; font-weight: bold; margin-bottom: 12px; color: #fff; text-shadow: 1px 1px 3px #000; } .badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; } .badge { background: rgba(255,255,255,0.25); backdrop-filter: blur(4px); padding: 6px 12px; border-radius: 20px; font-size: 0.85em; font-weight: 600; text-shadow: 1px 1px 2px #000; } .desc { font-size: 1.05em; line-height: 1.5; color: #e2e8f0; text-shadow: 1px 1px 2px #000; } .progress-container { position: absolute; top: 15px; left: 10px; right: 10px; display: flex; gap: 4px; z-index: 10; } .progress-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.3); border-radius: 2px; transition: background 0.3s; } .progress-bar.filled { background: #fff; box-shadow: 0 0 4px rgba(0,0,0,0.5); } .nav-zone { position: absolute; top: 0; height: 100%; width: 50%; z-index: 20; cursor: pointer; } .nav-left { left: 0; } .nav-right { right: 0; } </style></head><body><div class='app-container'><div id='progress' class='progress-container'></div><div class='nav-zone nav-left' onclick='prev()'></div><div class='nav-zone nav-right' onclick='next()'></div></div><script>let current = 0;const stories = document.querySelectorAll('.story');const prog = document.getElementById('progress');if(stories.length > 0) {  stories.forEach((_, i) => {    let b = document.createElement('div');    b.className = 'progress-bar';    b.id = 'bar-'+i;    prog.appendChild(b);  });  update();}function update() {  stories.forEach((s, i) => {    s.classList.toggle('active', i === current);    document.getElementById('bar-'+i).className = 'progress-bar' + (i <= current ? ' filled' : '');  });}function next() { if(current < stories.length - 1) { current++; update(); } }function prev() { if(current > 0) { current--; update(); } }</script></body></html>
